<!DOCTYPE html>
<html>
<head>
    <title>EQ3-2 Web BLE App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon.ico">
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="UTF-8">
</head>
<body>
    <div class="topnav">
        <h1>Motorisation AD EQ3-2</h1>
    </div>
    <div class="content">
        <div class="card-grid">
            <div class="card">
                <p>
                    <button id="connectBleButton" class="Button"> Connection</button>
                    <button id="disconnectBleButton" class="Button"> Déconnection</button>
                </p>
                <p class="label">Bluetoof: <strong><span id="bleState" >Déconnecté</span></strong></p>
            </div>
        </div>
        <!-- <!-- <div class="card-grid"> --> -->

            <div class="card">
                
				<h2>Suivi</h2>
                <button id="onButton" class="Button">ON</button>
                <button id="offButton" class="Button">OFF</button>
				<br><br>
            <!-- </div>				 -->
            <!-- <div class="card">				 -->
				<button id="sideralButton" class="Button">Sidéral</button>
                <button id="solaireButton" class="Button">Solaire</button>
				<button id="lunaireButton" class="Button">Lunaire</button>
				<p class="label">Fréquence: <span id="valueContainer">0.00</span> hz</p>
				<button id="moinsButton" class="Button">-0.02hz</button>
                <button id="plusButton" class="Button">+0.02hz</button>
				<br><br><br>
			</div>
            <div class="card">
                <h2>Déplacement</h2>
                <button id="xaButton" class="Button">Lent</button>
                <button id="xbButton" class="Button">Moyen</button>
				<button id="xcButton" class="Button">Rapide</button>
				<button id="xdButton" class="Button">Maxi</button>
				<br><br>
			<!-- </div> -->
			<!-- <div class="card"> -->
                <button id="estButton" class="Button">EST</button>
				<button id="stopButton" class="Button">STOP</button>
                <button id="ouestButton" class="Button">OUEST</button>
			</div>
		</div>
	</div>
    <div class="footer">
		
    </div>
</body>
<script>
    // DOM Elements
    const connectButton = document.getElementById('connectBleButton');
    const disconnectButton = document.getElementById('disconnectBleButton');
    const onButton = document.getElementById('onButton');
    const offButton = document.getElementById('offButton');
	const sideralButton = document.getElementById('sideralButton');
	const solaireButton = document.getElementById('solaireButton');
	const lunaireButton = document.getElementById('lunaireButton');
	const moinsButton = document.getElementById('moinsButton');
	const plusButton = document.getElementById('plusButton');
	const xaButton = document.getElementById('xaButton');
	const xbButton = document.getElementById('xbButton');
	const xcButton = document.getElementById('xcButton');
	const xdButton = document.getElementById('xdButton');
	const estButton = document.getElementById('estButton');
	const ouestButton = document.getElementById('ouestButton');
	const stopButton = document.getElementById('stopButton');
    const retrievedValue = document.getElementById('valueContainer');
    const latestValueSent = document.getElementById('valueSent');
    const bleStateContainer = document.getElementById('bleState');
    const timestampContainer = document.getElementById('timestamp');

    //Define BLE Device Specs
    var deviceName ='EQ3-2';
	var bleService = '45643b27-51fc-4bf1-a402-4dd7ff428001';
	var buttonCharacteristic = '45643b28-51fc-4bf1-a402-4dd7ff428001';	
	var frequenceCharacteristic= '45643b29-51fc-4bf1-a402-4dd7ff428001';

    //Global Variables to Handle Bluetooth
    var bleServer;
    var bleServiceFound;
    var frequenceCharacteristicFound;

    // Connect Button (search for BLE Devices only if BLE is available)
    connectButton.addEventListener('click', (event) => {
        if (isWebBluetoothEnabled()){
            connectToDevice();
        }
    });

    // Disconnect Button
    disconnectButton.addEventListener('click', disconnectDevice);

    // Write to the ESP32 Buttons Characteristic
    onButton.addEventListener('click', () => writeOnCharacteristic(1));
    offButton.addEventListener('click', () => writeOnCharacteristic(0));
	sideralButton.addEventListener('click', () => writeOnCharacteristic("2"));
	solaireButton.addEventListener('click', () => writeOnCharacteristic(3));
	lunaireButton.addEventListener('click', () => writeOnCharacteristic(4));
	moinsButton.addEventListener('click', () => writeOnCharacteristic(5));
	plusButton.addEventListener('click', () => writeOnCharacteristic(6));
	xaButton.addEventListener('click', () => writeOnCharacteristic(7));
	xbButton.addEventListener('click', () => writeOnCharacteristic(8));
	xcButton.addEventListener('click', () => writeOnCharacteristic(9));
	xdButton.addEventListener('click', () => writeOnCharacteristic(10));
	estButton.addEventListener('click', () => writeOnCharacteristic(11));
	ouestButton.addEventListener('click', () => writeOnCharacteristic(12));
	stopButton.addEventListener('click', () => writeOnCharacteristic(13));
	
    // Check if BLE is available in your Browser
    function isWebBluetoothEnabled() {
        if (!navigator.bluetooth) {
            console.log('Web Bluetooth API is not available in this browser!');
            bleStateContainer.innerHTML = "Web Bluetooth API is not available in this browser/device!";
            return false
        }
        console.log('Web Bluetooth API supported in this browser.');
        return true
    }

    // Connect to BLE Device and Enable Notifications
    function connectToDevice(){
        console.log('Initializing Bluetooth...');
        navigator.bluetooth.requestDevice({
            filters: [{name: deviceName}],
            optionalServices: [bleService]
        })
        .then(device => {
            console.log('Device Selected:', device.name);
            bleStateContainer.innerHTML = 'Connecté à : ' + device.name;
            bleStateContainer.style.color = "#24af37";
            device.addEventListener('gattserverdisconnected', onDisconnected);
            return device.gatt.connect();
        })
        .then(gattServer =>{
            bleServer = gattServer;
            console.log("Connected to GATT Server");
            return bleServer.getPrimaryService(bleService);
        })
        .then(service => {
            bleServiceFound = service;
            console.log("Service discovered:", service.uuid);
            return service.getCharacteristic(frequenceCharacteristic);
        })
        .then(characteristic => {
            console.log("Characteristic discovered:", characteristic.uuid);
            frequenceCharacteristicFound = characteristic;
            characteristic.addEventListener('characteristicvaluechanged', handleCharacteristicChange);
            characteristic.startNotifications();
            console.log("Notifications Started.");
            return characteristic.readValue();
        })
        .then(value => {
            console.log("Read value: ", value);
            const decodedValue = new TextDecoder().decode(value);
            console.log("Decoded value: ", decodedValue);
            retrievedValue.innerHTML = decodedValue;
        })
        .catch(error => {
            console.log('Error: ', error);
        })
    }

    function onDisconnected(event){
        console.log('Device Disconnected:', event.target.device.name);
        bleStateContainer.innerHTML = "Déconnecté";
		bleStateContainer.style.color = "#d13a30";
        connectToDevice();
    }

    function handleCharacteristicChange(event){
        const newValueReceived = new TextDecoder().decode(event.target.value);
        console.log("Characteristic value changed: ", newValueReceived);
        retrievedValue.innerHTML = newValueReceived;
        timestampContainer.innerHTML = getDateTime();
    }

    function writeOnCharacteristic(value){
        if (bleServer && bleServer.connected) {
            bleServiceFound.getCharacteristic(buttonCharacteristic)
            .then(characteristic => {
                console.log("Found the BUTTONcharacteristic: ", characteristic.uuid);
                const data = new Uint8Array([value]);
                return characteristic.writeValue(data);
            })
            .then(() => {
                latestValueSent.innerHTML = value;
                console.log("Value written to BUTTONcharacteristic:", value);
            })
            .catch(error => {
                console.error("Error writing to the BUTTONcharacteristic: ", error);
            });
        } else {
            console.error ("Bluetooth is not connected. Cannot write to characteristic.")
            window.alert("Bluetooth is not connected. Cannot write to characteristic. \n Connect to BLE first!")
        }
    }

    function disconnectDevice() {
        console.log("Disconnect Device.");
        if (bleServer && bleServer.connected) {
            if (frequenceCharacteristicFound) {
                frequenceCharacteristicFound.stopNotifications()
                    .then(() => {
                        console.log("Notifications Stopped");
                        return bleServer.disconnect();
                    })
                    .then(() => {
                        console.log("Device Disconnected");
                        bleStateContainer.innerHTML = "Déconnecté";
                        bleStateContainer.style.color = "#d13a30";

                    })
                    .catch(error => {
                        console.log("An error occurred:", error);
                    });
            } else {
                console.log("No characteristic found to disconnect.");
            }
        } else {
            // Throw an error if Bluetooth is not connected
            console.error("Bluetooth is not connected.");
            window.alert("Bluetooth is not connected.")
        }
    }

    function getDateTime() {
        var currentdate = new Date();
        var day = ("00" + currentdate.getDate()).slice(-2); // Convert day to string and slice
        var month = ("00" + (currentdate.getMonth() + 1)).slice(-2);
        var year = currentdate.getFullYear();
        var hours = ("00" + currentdate.getHours()).slice(-2);
        var minutes = ("00" + currentdate.getMinutes()).slice(-2);
        var seconds = ("00" + currentdate.getSeconds()).slice(-2);

        var datetime = day + "/" + month + "/" + year + " at " + hours + ":" + minutes + ":" + seconds;
        return datetime;
    }


</script>

</html>
